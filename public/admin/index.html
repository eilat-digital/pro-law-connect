<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>ניהול תוכן | שירן שושני – חברת עורכי דין</title>
    <style>
      /* ===== התאמת Decap CMS לפריסת RTL מלאה =====
         הממשק של Decap בנוי ל-LTR עם ריפוד פיזי (padding-left) שמפנה מקום
         לתפריט הצד. ב-RTL התפריט עובר לימין, ולכן מחליפים את כיוון הריפוד —
         זה התיקון שמונע את חפיפת התפריט עם התוכן. */
      [class*="CollectionMain"] {
        padding-left: 0 !important;
        padding-right: 280px !important;
      }

      /* שדות הקלדה — עברית מימין לשמאל */
      input[type="text"],
      input:not([type]),
      textarea,
      [data-slate-editor="true"] {
        direction: rtl;
        text-align: right;
      }

      /* גופן עברי נעים לתוויות ולכותרות קבוצות */
      label,
      [class*="FieldLabel"],
      [class*="ListItemTopBar"],
      [class*="ObjectWidgetTopBar"],
      [class*="SidebarHeading"],
      [class*="CollectionTopHeading"] {
        font-family: 'Heebo', 'Segoe UI', Arial, sans-serif !important;
      }

      /* טקסטים של רמזים (hint) מתחת לשדות */
      [class*="FieldHint"],
      [class*="ControlHint"] {
        direction: rtl;
        text-align: right;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Decap CMS (לשעבר Netlify CMS) — התחברות דרך GitHub OAuth -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // עיצוב התצוגה המקדימה (חלונית התצוגה בעורך) בסגנון האתר
      CMS.registerPreviewStyle("/admin/preview.css");
    </script>
  </body>
</html>
